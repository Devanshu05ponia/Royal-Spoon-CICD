<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Management | Royal Spoon Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/menu-management.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a href="dashboard.html"
class="navbar-brand text-warning">

🍽 Royal Spoon Admin

</a>

<a href="../index.html"
class="btn btn-warning">

🏠 Website

</a>

</div>

</nav>

<div class="container my-5">

<h2 class="text-warning mb-4">

🍽 Menu Management

</h2>

<div class="card bg-dark p-4 mb-5">

<div class="row">

<div class="col-md-6 mb-3">

<input
type="text"
id="foodName"
class="form-control"
placeholder="Food Name">

</div>

<div class="col-md-6 mb-3">

<input
type="number"
id="foodPrice"
class="form-control"
placeholder="Price">

</div>

<div class="col-md-6 mb-3">

<select
id="foodCategory"
class="form-select">

<option>Starter</option>

<option>Main Course</option>

<option>Pizza</option>

<option>Burger</option>

<option>Pasta</option>

<option>Chinese</option>

<option>Indian</option>

<option>Dessert</option>

<option>Drinks</option>

</select>

</div>

<div class="col-md-6 mb-3">

<input
type="text"
id="foodImage"
class="form-control"
placeholder="Image URL">

</div>

<div class="col-12 mb-3">

<textarea
id="foodDescription"
class="form-control"
rows="3"
placeholder="Food Description"></textarea>

</div>

<div class="col-md-6">

<select
id="foodStatus"
class="form-select">

<option>Available</option>

<option>Out Of Stock</option>

</select>

</div>

<div class="col-md-6">

<button
class="btn btn-warning w-100"
id="addFood">

➕ Add Food

</button>

</div>

</div>

</div>

<div class="table-responsive">

<table class="table table-dark table-hover">

<thead>

<tr>

<th>Image</th>

<th>Name</th>

<th>Category</th>

<th>Price</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="menuTable">

</tbody>

</table>

</div>

</div>

<script src="../js/menu-management.js"></script>

</body>

</html>
