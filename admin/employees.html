<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employees | Royal Spoon Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/employees.css">

</head>

<body class="bg-dark text-white">

<nav class="navbar navbar-dark bg-black">

<div class="container">

<a class="navbar-brand text-warning"
href="dashboard.html">

🍽 Royal Spoon Admin

</a>

<a href="../index.html"
class="btn btn-warning">

Website

</a>

</div>

</nav>

<div class="container py-5">

<h2 class="text-warning mb-4">

👨 Employee Management

</h2>

<!-- Statistics -->

<div class="row mb-4">

<div class="col-md-3">

<div class="card bg-dark border-warning text-center p-3">

<h5>Total Employees</h5>

<h2 id="totalEmployees">0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card bg-dark border-success text-center p-3">

<h5>Active</h5>

<h2 id="activeEmployees">0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card bg-dark border-danger text-center p-3">

<h5>Inactive</h5>

<h2 id="inactiveEmployees">0</h2>

</div>

</div>

<div class="col-md-3">

<div class="card bg-dark border-info text-center p-3">

<h5>Departments</h5>

<h2>5</h2>

</div>

</div>

</div>

<!-- Search -->

<div class="mb-4">

<input

type="text"

class="form-control"

id="searchEmployee"

placeholder="🔍 Search Employee">

</div>

<!-- Form -->

<div class="card bg-dark p-4 mb-5">

<div class="row">

<div class="col-md-4 mb-3">

<input

type="text"

id="empName"

class="form-control"

placeholder="Employee Name">

</div>

<div class="col-md-4 mb-3">

<select

id="empRole"

class="form-select">

<option>Chef</option>

<option>Waiter</option>

<option>Manager</option>

<option>Cashier</option>

<option>Delivery Boy</option>

</select>

</div>

<div class="col-md-4 mb-3">

<input

type="number"

id="empSalary"

class="form-control"

placeholder="Salary">

</div>

<div class="col-md-4 mb-3">

<input

type="tel"

id="empPhone"

class="form-control"

placeholder="Phone">

</div>

<div class="col-md-4 mb-3">

<input

type="email"

id="empEmail"

class="form-control"

placeholder="Email">

</div>

<div class="col-md-4 mb-3">

<select

id="empShift"

class="form-select">

<option>Morning</option>

<option>Evening</option>

<option>Night</option>

</select>

</div>

<div class="col-md-4 mb-3">

<input

type="date"

id="joiningDate"

class="form-control">

</div>

<div class="col-md-4 mb-3">

<select

id="empStatus"

class="form-select">

<option>Active</option>

<option>Inactive</option>

</select>

</div>

<div class="col-md-4 mb-3">

<button

class="btn btn-warning w-100"

id="addEmployee">

➕ Add Employee

</button>

</div>

</div>

</div>

<!-- Employee Table -->

<div class="table-responsive">

<table class="table table-dark table-hover align-middle">

<thead>

<tr>

<th>Name</th>

<th>Role</th>

<th>Salary</th>

<th>Phone</th>

<th>Email</th>

<th>Shift</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="employeeTable">

</tbody>

</table>

</div>

</div>

<script src="../js/employees.js"></script>

</body>

</html>
