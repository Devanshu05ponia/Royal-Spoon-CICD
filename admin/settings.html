<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | Royal Spoon Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="../css/settings.css">

</head>

<body>

<nav class="navbar navbar-dark bg-black">

<div class="container">

<a class="navbar-brand text-warning fw-bold"
href="dashboard.html">

🍽 Royal Spoon Admin

</a>

<a href="../index.html"
class="btn btn-warning">

Visit Website

</a>

</div>

</nav>

<div class="container py-5">

<h2 class="text-warning mb-5">

⚙ Restaurant Settings

</h2>

<div class="card p-4">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Restaurant Name

</label>

<input
type="text"
class="form-control"
id="restaurantName"
placeholder="Royal Spoon">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Email

</label>

<input
type="email"
class="form-control"
id="email"
placeholder="info@royalspoon.com">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Phone

</label>

<input
type="text"
class="form-control"
id="phone">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Delivery Charge

</label>

<input
type="number"
class="form-control"
id="delivery">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

GST (%)

</label>

<input
type="number"
class="form-control"
id="gst">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Website

</label>

<input
type="text"
class="form-control"
id="website">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Opening Time

</label>

<input
type="time"
class="form-control"
id="opening">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Closing Time

</label>

<input
type="time"
class="form-control"
id="closing">

</div>

<div class="col-12 mb-3">

<label class="form-label">

Restaurant Address

</label>

<textarea
class="form-control"
rows="3"
id="address"></textarea>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Facebook

</label>

<input
type="text"
class="form-control"
id="facebook">

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

Instagram

</label>

<input
type="text"
class="form-control"
id="instagram">

</div>

<div class="col-12">

<button
class="btn btn-warning btn-lg"
id="saveSettings">

Save Settings

</button>

</div>

</div>

</div>

</div>

<script src="../js/settings.js"></script>

</body>

</html>
