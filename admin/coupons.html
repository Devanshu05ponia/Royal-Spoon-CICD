<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coupons | Royal Spoon Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="../css/coupons.css">

</head>

<body class="bg-dark">

<nav class="navbar navbar-dark bg-black">

<div class="container">

<a class="navbar-brand text-warning fw-bold"
href="dashboard.html">

🍽 Royal Spoon Admin

</a>

<a href="../index.html"
class="btn btn-warning">

Visit Website

</a>

</div>

</nav>

<div class="container py-5">

<h2 class="text-warning mb-5">

🎟 Coupon Management

</h2>

<div class="row">

<div class="col-lg-4">

<div class="card p-4">

<h4 class="text-warning mb-4">

Create Coupon

</h4>

<input
type="text"
id="couponName"
class="form-control mb-3"
placeholder="Coupon Code">

<input
type="number"
id="discount"
class="form-control mb-3"
placeholder="Discount (%)">

<input
type="date"
id="expiry"
class="form-control mb-4">

<button
class="btn btn-warning w-100"
id="addCoupon">

Create Coupon

</button>

</div>

</div>

<div class="col-lg-8">

<div class="card p-4">

<h4 class="text-warning mb-4">

Available Coupons

</h4>

<table class="table table-dark table-hover">

<thead>

<tr>

<th>Coupon</th>

<th>Discount</th>

<th>Expiry</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="couponTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="../js/coupons.js"></script>

</body>

</html>
