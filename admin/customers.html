<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Customers | Royal Spoon Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/customers.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a href="dashboard.html"
class="navbar-brand text-warning">

🍽 Royal Spoon Admin

</a>

<a href="../index.html"
class="btn btn-warning">

🏠 Website

</a>

</div>

</nav>

<div class="container my-5">

<div class="row mb-4">

<div class="col-md-6">

<h2 class="text-warning">

👥 Customers

</h2>

</div>

<div class="col-md-6">

<input

type="text"

id="searchCustomer"

class="form-control"

placeholder="Search customer by name or email">

</div>

</div>

<div class="row mb-4">

<div class="col-md-4">

<div class="card customer-card">

<h5>

Total Customers

</h5>

<h2 id="totalCustomers">

0

</h2>

</div>

</div>

<div class="col-md-4">

<div class="card customer-card">

<h5>

Registered Users

</h5>

<h2 id="registeredUsers">

0

</h2>

</div>

</div>

<div class="col-md-4">

<div class="card customer-card">

<h5>

Active Customers

</h5>

<h2 id="activeCustomers">

0

</h2>

</div>

</div>

</div>

<div class="table-responsive">

<table class="table table-dark table-hover">

<thead>

<tr>

<th>Photo</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Action</th>

</tr>

</thead>

<tbody id="customerTable">

</tbody>

</table>

</div>

</div>

<script src="../js/customers.js"></script>

</body>

</html>
