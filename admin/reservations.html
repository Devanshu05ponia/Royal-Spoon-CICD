<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reservations | Royal Spoon Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/reservations.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a href="dashboard.html"
class="navbar-brand text-warning">

🍽 Royal Spoon Admin

</a>

<a href="../index.html"
class="btn btn-warning">

🏠 Website

</a>

</div>

</nav>

<div class="container my-5">

<h2 class="text-warning mb-4">

📅 Reservation Management

</h2>

<div class="row mb-4">

<div class="col-md-6">

<input

type="text"

id="searchReservation"

class="form-control"

placeholder="Search by customer name">

</div>

<div class="col-md-6">

<select
id="reservationFilter"
class="form-select">

<option value="All">

All Reservations

</option>

<option>

Pending

</option>

<option>

Approved

</option>

<option>

Rejected

</option>

</select>

</div>

</div>

<div class="table-responsive">

<table class="table table-dark table-hover">

<thead>

<tr>

<th>Name</th>

<th>Phone</th>

<th>Date</th>

<th>Time</th>

<th>Guests</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="reservationTable">

</tbody>

</table>

</div>

</div>

<script src="../js/reservations.js"></script>

</body>

</html>
