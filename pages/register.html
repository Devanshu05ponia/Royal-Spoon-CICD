<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Royal Spoon</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Google Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}

body{

background:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1600");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

min-height:100vh;

position:relative;

}

.overlay{

position:fixed;

top:0;
left:0;

width:100%;

height:100%;

background:rgba(0,0,0,.78);

z-index:1;

}

.home-btn{

position:absolute;

top:25px;

left:25px;

z-index:999;

color:white;

text-decoration:none;

font-weight:600;

}

.home-btn:hover{

color:#ffc107;

}

.register-card{

position:relative;

z-index:10;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.2);

border-radius:25px;

padding:45px;

color:white;

box-shadow:0 20px 40px rgba(0,0,0,.5);

animation:fadeIn .8s ease;

}

.logo{

color:#ffc107;

font-weight:700;

margin-bottom:10px;

}

.form-label{

color:white;

}

.form-control{

background:rgba(255,255,255,.12);

border:none;

height:50px;

color:white;

}

.form-control::placeholder{

color:#ddd;

}

.form-control:focus{

background:rgba(255,255,255,.2);

color:white;

box-shadow:none;

}

.input-group-text{

background:#ffc107;

border:none;

}

.register-btn{

padding:12px;

border-radius:50px;

font-weight:600;

}

.login-link{

color:#ffc107;

text-decoration:none;

font-weight:600;

}

.login-link:hover{

color:white;

}

.strength{

font-size:14px;

margin-top:6px;

}

.weak{

color:red;

}

.medium{

color:orange;

}

.strong{

color:lime;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:768px){

.register-card{

padding:30px;

}

}

</style>

</head>

<body>

<div class="overlay"></div>

<a href="index.html" class="home-btn">

<i class="fas fa-arrow-left"></i>

Back To Home

</a>

<div class="container">

<div class="row justify-content-center align-items-center min-vh-100">

<div class="col-lg-6">

<div class="register-card">

<div class="text-center mb-4">

<h1 class="logo">

🍽 Royal Spoon

</h1>

<h3>

Create Your Account

</h3>

<p>

Register to enjoy premium dining.

</p>

</div>

<form id="registerForm">

<div class="mb-3">

<label class="form-label">

Full Name

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-user"></i>

</span>

<input

type="text"

class="form-control"

id="name"

placeholder="Enter your full name"

required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Email

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-envelope"></i>

</span>

<input

type="email"

class="form-control"

id="email"

placeholder="Enter your email"

required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Phone Number

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-phone"></i>

</span>

<input

type="tel"

class="form-control"

id="phone"

placeholder="Enter phone number"

maxlength="10"

required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-lock"></i>

</span>

<input

type="password"

class="form-control"

id="password"

placeholder="Create password"

required>

<button

type="button"

class="btn btn-warning"

id="togglePassword">

<i class="fas fa-eye"></i>

</button>

</div>

<div id="strength" class="strength"></div>

</div>

<div class="mb-4">

<label class="form-label">

Confirm Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fas fa-lock"></i>

</span>

<input

type="password"

class="form-control"

id="confirmPassword"

placeholder="Confirm password"

required>

</div>

</div>

                        <div class="form-check mb-4">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="terms"
                                required>

                            <label class="form-check-label">

                                I agree to the Terms & Conditions

                            </label>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-warning w-100 register-btn">

                            Register

                        </button>

                        <div class="text-center mt-4">

                            <p>

                                OR

                            </p>

                            <button
                                type="button"
                                class="btn btn-light w-100 mb-3"
                                id="googleBtn">

                                <i class="fab fa-google text-danger"></i>

                                Continue with Google

                            </button>

                            <p>

                                Already have an account?

                                <a href="login.html" class="login-link">

                                    Login Here

                                </a>

                            </p>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// ==============================
// PASSWORD SHOW / HIDE
// ==============================

const togglePassword=document.getElementById("togglePassword");

const password=document.getElementById("password");

togglePassword.addEventListener("click",function(){

if(password.type==="password"){

password.type="text";

this.innerHTML='<i class="fas fa-eye-slash"></i>';

}

else{

password.type="password";

this.innerHTML='<i class="fas fa-eye"></i>';

}

});

// ==============================
// PASSWORD STRENGTH
// ==============================

password.addEventListener("keyup",function(){

const strength=document.getElementById("strength");

const value=password.value;

if(value.length<6){

strength.innerHTML="Weak Password";

strength.className="strength weak";

}

else if(value.length<10){

strength.innerHTML="Medium Password";

strength.className="strength medium";

}

else{

strength.innerHTML="Strong Password";

strength.className="strength strong";

}

});

// ==============================
// REGISTER
// ==============================

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const name=document.getElementById("name").value.trim();

const email=document.getElementById("email").value.trim();

const phone=document.getElementById("phone").value.trim();

const pass=document.getElementById("password").value;

const confirm=document.getElementById("confirmPassword").value;

const terms=document.getElementById("terms").checked;

// Name

if(name.length<3){

alert("Please enter a valid name.");

return;

}

// Email

const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailPattern.test(email)){

alert("Invalid Email Address.");

return;

}

// Phone

if(phone.length!=10 || isNaN(phone)){

alert("Enter a valid 10-digit phone number.");

return;

}

// Password

if(pass.length<6){

alert("Password must be at least 6 characters.");

return;

}

if(pass!==confirm){

alert("Passwords do not match.");

return;

}

if(!terms){

alert("Please accept Terms & Conditions.");

return;

}

// Check Existing User

let users=JSON.parse(localStorage.getItem("royalUsers")) || [];

const existing=users.find(user=>user.email===email);

if(existing){

alert("Email already registered.");

return;

}

// Save User

users.push({

name:name,

email:email,

phone:phone,

password:pass

});

localStorage.setItem("royalUsers",JSON.stringify(users));

alert("Registration Successful!");

window.location.href="login.html";

});

// ==============================
// GOOGLE BUTTON
// ==============================

document.getElementById("googleBtn").addEventListener("click",function(){

    const googleUser={

        name:"Google User",

        email:"googleuser@gmail.com"

    };

    localStorage.setItem("loggedIn","true");

    localStorage.setItem("currentUser",JSON.stringify(googleUser));

    alert("Signed in with Google Successfully!");

    window.location.href="index.html";

});

</script>

</body>

</html>
