<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout | Royal Spoon</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/checkout.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a href="../index.html"
class="navbar-brand text-warning fw-bold">

🍽 Royal Spoon

</a>

<a href="cart.html"
class="btn btn-warning">

← Back To Cart

</a>

</div>

</nav>

<!-- HERO -->

<section class="checkout-hero">

<div class="container text-center">

<h1>

Checkout

</h1>

<p>

Complete your order details

</p>

</div>

</section>

<!-- MAIN -->

<section class="container my-5">

<div class="row">

<!-- LEFT -->

<div class="col-lg-8">

<div class="checkout-card">

<h3>

Delivery Information

</h3>

<form id="checkoutForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>

Full Name

</label>

<input
type="text"
class="form-control"
id="name"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Phone Number

</label>

<input
type="tel"
class="form-control"
id="phone"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Email

</label>

<input
type="email"
class="form-control"
id="email"
required>

</div>

<div class="col-md-6 mb-3">

<label>

City

</label>

<input
type="text"
class="form-control"
id="city"
required>

</div>

<div class="col-12 mb-3">

<label>

Delivery Address

</label>

<textarea
class="form-control"
rows="4"
id="address"
required></textarea>

</div>

<div class="col-md-6 mb-3">

<label>

PIN Code

</label>

<input
type="text"
class="form-control"
id="pin"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Delivery Type

</label>

<select
class="form-select"
id="deliveryType">

<option>

Standard Delivery

</option>

<option>

Express Delivery

</option>

</select>

</div>

<div class="col-12">

<label>

Order Notes

</label>

<textarea
class="form-control"
rows="3"
id="notes"></textarea>

</div>

</div>

<button
type="submit"
class="btn btn-success mt-4 w-100">

Continue To Payment

</button>

</form>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-4">

<div class="summary-card">

<h3>

Order Summary

</h3>

<hr>

<p>

Subtotal

<span
class="float-end"
id="subtotal">

₹0

</span>

</p>

<p>

GST

<span
class="float-end"
id="gst">

₹0

</span>

</p>

<p>

Delivery

<span
class="float-end"
id="delivery">

₹80

</span>

</p>

<hr>

<h4>

Total

<span
class="float-end"
id="grandTotal">

₹0

</span>

</h4>

</div>

</div>

</div>

</section>

<script src="../js/checkout.js"></script>

</body>

</html>
