<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Payment | Royal Spoon</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Google Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="../css/payment.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a href="../index.html"

class="navbar-brand text-warning fw-bold">

🍽 Royal Spoon

</a>

<a href="checkout.html"

class="btn btn-warning">

← Back

</a>

</div>

</nav>

<!-- HERO -->

<section class="payment-hero">

<div class="container text-center">

<h1>

Secure Payment

</h1>

<p>

Choose your preferred payment method

</p>

</div>

</section>

<!-- MAIN -->

<section class="container my-5">

<div class="row">

<!-- LEFT -->

<div class="col-lg-8">

<div class="payment-card">

<h3>

Select Payment Method

</h3>

<hr>

<div class="form-check mt-3">

<input
class="form-check-input"

type="radio"

name="payment"

value="Card"

checked>

<label class="form-check-label">

💳 Credit / Debit Card

</label>

</div>

<div class="form-check mt-3">

<input
class="form-check-input"

type="radio"

name="payment"

value="UPI">

<label class="form-check-label">

📱 UPI

</label>

</div>

<div class="form-check mt-3">

<input
class="form-check-input"

type="radio"

name="payment"

value="Net Banking">

<label class="form-check-label">

🏦 Net Banking

</label>

</div>

<div class="form-check mt-3">

<input
class="form-check-input"

type="radio"

name="payment"

value="Cash On Delivery">

<label class="form-check-label">

🚚 Cash On Delivery

</label>

</div>

<hr>

<!-- CARD DETAILS -->

<div id="cardSection">

<div class="row">

<div class="col-md-12 mb-3">

<label>

Card Number

</label>

<input

type="text"

id="cardNumber"

class="form-control"

placeholder="1234 5678 9012 3456">

</div>

<div class="col-md-6 mb-3">

<label>

Card Holder

</label>

<input

type="text"

id="cardHolder"

class="form-control">

</div>

<div class="col-md-3 mb-3">

<label>

Expiry

</label>

<input

type="text"

id="expiry"

class="form-control"

placeholder="MM/YY">

</div>

<div class="col-md-3 mb-3">

<label>

CVV

</label>

<input

type="password"

id="cvv"

maxlength="3"

class="form-control">

</div>

</div>

</div>

<!-- UPI -->

<div id="upiSection" style="display:none;">

<label>

UPI ID

</label>

<input

type="text"

id="upi"

class="form-control"

placeholder="name@upi">

<div class="mt-3">

<button class="btn btn-light">

Google Pay

</button>

<button class="btn btn-light">

PhonePe

</button>

<button class="btn btn-light">

Paytm

</button>

<button class="btn btn-light">

BHIM

</button>

</div>

</div>

<button

id="payNow"

class="btn btn-success w-100 mt-4">

Pay Now

</button>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-4">

<div class="summary-card">

<h3>

Payment Summary

</h3>

<hr>

<p>

Total Amount

<span

class="float-end"

id="amount">

₹0

</span>

</p>

<p>

Payment Status

<span

class="float-end text-warning">

Pending

</span>

</p>

</div>

</div>

</div>

</section>

<script src="../js/payment.js"></script>

</body>

</html>
