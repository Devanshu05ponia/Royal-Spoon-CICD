<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Royal Spoon | Our Menu</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet" href="../css/menu.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold text-warning" href="../index.html">

            🍽 Royal Spoon

        </a>

        <div class="d-flex align-items-center">

            <a href="cart.html" class="btn btn-warning position-relative">

                <i class="fas fa-shopping-cart"></i>

                Cart

                <span id="cartCount"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

                    0

                </span>

            </a>

        </div>

    </div>

</nav>

<!-- ================= HERO ================= -->

<section class="menu-hero">

    <div class="container text-center">

        <h1>

            Our Signature Menu

        </h1>

        <p>

            Fresh Ingredients • Premium Quality • Luxury Dining Experience

        </p>

    </div>

</section>

<!-- ================= SEARCH ================= -->

<section class="container mt-5">

    <div class="row">

        <div class="col-lg-6">

            <input
                type="text"
                id="searchInput"
                class="form-control form-control-lg"
                placeholder="🔍 Search your favourite dish...">

        </div>

        <div class="col-lg-3 mt-3 mt-lg-0">

            <select id="categoryFilter" class="form-select form-select-lg">

                <option value="All">All Categories</option>

                <option value="Pizza">Pizza</option>

                <option value="Burger">Burger</option>

                <option value="Indian">Indian</option>

                <option value="Chinese">Chinese</option>

                <option value="Pasta">Pasta</option>

                <option value="Dessert">Dessert</option>

                <option value="Drinks">Drinks</option>

            </select>

        </div>

        <div class="col-lg-3 mt-3 mt-lg-0">

            <select id="sortPrice" class="form-select form-select-lg">

                <option value="default">Sort By</option>

                <option value="low">Price : Low to High</option>

                <option value="high">Price : High to Low</option>

            </select>

        </div>

    </div>

</section>

<!-- ================= CATEGORY BUTTONS ================= -->

<section class="container mt-4">

    <div class="category-buttons text-center">

        <button class="btn btn-warning category-btn active" data-category="All">

            All

        </button>

        <button class="btn btn-outline-warning category-btn" data-category="Pizza">

            Pizza

        </button>

        <button class="btn btn-outline-warning category-btn" data-category="Burger">

            Burger

        </button>

        <button class="btn btn-outline-warning category-btn" data-category="Indian">

            Indian

        </button>

        <button class="btn btn-outline-warning category-btn" data-category="Chinese">

            Chinese

        </button>

        <button class="btn btn-outline-warning category-btn" data-category="Pasta">

            Pasta

        </button>

        <button class="btn btn-outline-warning category-btn" data-category="Dessert">

            Dessert

        </button>

        <button class="btn btn-outline-warning category-btn" data-category="Drinks">

            Drinks

        </button>

    </div>

</section>

<!-- ================= MENU ITEMS ================= -->

<section class="container my-5">

    <div class="row g-4" id="menuContainer">

        <!-- JavaScript will automatically generate
             all 24 food cards here -->

    </div>

</section>

<!-- ================= FOOTER ================= -->

<footer class="bg-dark text-white text-center py-4">

    <p class="mb-0">

        © 2026 Royal Spoon | Luxury Restaurant

    </p>

</footer>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Menu JS -->

<script src="../js/menu.js"></script>

</body>

</html>
